appId: ${MAESTRO_APP_ID}
name: View billing list
tags:
  - regression
  - billing
---
- runFlow: login.yaml

# "Bills" is the visible label for the billing tab.
- tapOn: "Bills"

- assertVisible:
    text: "Bills"
    timeout: 20000

# The billing screen renders a FlatList of invoices. Each invoice
# row shows the invoice number and a status badge ("PAID", "PENDING",
# or "PARTIAL"). The seeded demo patient always has at least one
# invoice — assert that at least one status badge is visible. Maestro
# matches the first match so this succeeds if any of the three show.
- assertVisible:
    text: "Total"
    timeout: 20000

# Defensive check: if the empty state ever renders, fail — seed data
# is expected to populate this.
- assertNotVisible: "No invoices yet"
